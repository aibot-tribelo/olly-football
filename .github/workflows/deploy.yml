name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Fetch PlayerData GPS stats
        env:
          PLAYERDATA_EMAIL: ${{ secrets.PLAYERDATA_EMAIL }}
          PLAYERDATA_PASSWORD: ${{ secrets.PLAYERDATA_PASSWORD }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: node scripts/fetch-playerdata.mjs
      - name: Commit updated gps.yaml (caches AI taglines + new session data)
        run: |
          git config user.name "enzo-aibot"
          git config user.email "aibot@tribelo.co.uk"
          git add src/content/gps/gps.yaml
          git diff --staged --quiet || git commit -m "data(gps): update GPS data + AI taglines [skip ci]" && git push
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
